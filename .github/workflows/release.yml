name: Release CLI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "codex-api-tools-v*"

permissions:
  contents: write

jobs:
  test-cli:
    name: Test CLI and Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run CLI tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --bin codex-tools --locked

      - name: Check CLI build
        run: cargo check --manifest-path src-tauri/Cargo.toml --bin codex-tools --locked

      - name: Validate Worker bundle
        run: npx --yes wrangler deploy --dry-run --config cloudflare/sync-api/wrangler.jsonc

  build-cli:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    needs:
      - test-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon CLI
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            package-name: codex-tools-cli-macos-aarch64
            binary-path: src-tauri/target/aarch64-apple-darwin/release/codex-tools
          - name: macOS Intel CLI
            platform: macos-latest
            rust-target: x86_64-apple-darwin
            package-name: codex-tools-cli-macos-x64
            binary-path: src-tauri/target/x86_64-apple-darwin/release/codex-tools
          - name: Windows x64 CLI
            platform: windows-latest
            rust-target: ""
            package-name: codex-tools-cli-windows-x64
            binary-path: src-tauri/target/release/codex-tools.exe
          - name: Linux x64 CLI
            platform: ubuntu-latest
            rust-target: ""
            package-name: codex-tools-cli-linux-x64
            binary-path: src-tauri/target/release/codex-tools

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Build standalone CLI
        shell: bash
        run: |
          args=(build --manifest-path src-tauri/Cargo.toml --bin codex-tools --release)
          if [[ -n "${{ matrix.rust-target }}" ]]; then
            args+=(--target "${{ matrix.rust-target }}")
          fi
          cargo "${args[@]}"

      - name: Smoke test CLI
        shell: bash
        run: '"${{ matrix.binary-path }}" --help'

      - name: Package CLI artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-cli
          cp "${{ matrix.binary-path }}" "release-cli/${{ matrix.package-name }}"
          chmod +x "release-cli/${{ matrix.package-name }}"

      - name: Package CLI artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release-cli" | Out-Null
          Copy-Item "${{ matrix.binary-path }}" "release-cli/${{ matrix.package-name }}.exe"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package-name }}
          path: release-cli/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Add CLI install scripts
        shell: bash
        run: |
          mkdir -p release-assets/installers
          cp scripts/install-codex-tools.sh release-assets/installers/install-codex-tools.sh
          cp scripts/install-codex-tools.ps1 release-assets/installers/install-codex-tools.ps1
          chmod +x release-assets/installers/install-codex-tools.sh

      - name: Create CLI checksum manifest
        shell: bash
        run: |
          checksum_file="release-assets/installers/codex-tools-cli-checksums.txt"
          : > "${checksum_file}"
          mapfile -d '' -t cli_files < <(find release-assets -type f -name 'codex-tools-cli-*' -print0 | sort -z)
          if [[ "${#cli_files[@]}" -eq 0 ]]; then
            echo "No CLI binaries found" >&2
            exit 1
          fi
          for file in "${cli_files[@]}"; do
            name="$(basename "${file}")"
            hash="$(sha256sum "${file}" | awk '{print $1}')"
            printf '%s  %s\n' "${hash}" "${name}" >> "${checksum_file}"
          done

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          version="$(awk -F '"' '/^version = / { print $2; exit }' src-tauri/Cargo.toml)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="codex-api-tools-v${version}-${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found" >&2
            exit 1
          fi

          title="Codex API Tools CLI v${RELEASE_VERSION}"
          notes=$'CLI-only release for Codex API Tools.\n\nInstall:\nmacOS/Linux: curl -fsSL https://github.com/simplaj/Codex-API-Tools/releases/latest/download/install-codex-tools.sh | bash\nWindows PowerShell: irm https://github.com/simplaj/Codex-API-Tools/releases/latest/download/install-codex-tools.ps1 | iex\n\nThe installer downloads one platform binary, verifies SHA-256 with codex-tools-cli-checksums.txt, installs it into the user PATH, and does not require Node.js, npm, or Rust. Raw codex-tools-cli-* assets are standalone command-line binaries.'

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${files[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes "${notes}"
          fi
