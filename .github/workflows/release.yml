name: Release desktop app

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "app-v*"
      - "codex-api-tools-v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg,app
          - name: macOS Intel
            platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg,app
          - name: Windows x64
            platform: windows-latest
            rust-target: ""
            args: --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure macOS ad-hoc signing
        if: runner.os == 'macOS'
        run: echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('codex-api-tools-v__VERSION__-{0}', github.run_number) }}
          releaseName: Codex API Tools v__VERSION__
          releaseBody: |
            Download the Windows or macOS installer from the assets below.

            This build uses the native Rust/rusqlite sync engine and does not require Node.js 24 on end-user machines.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
