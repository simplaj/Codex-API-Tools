[package]
name = "codex-api-tools"
version = "0.1.0"
description = "Codex API toolbox for provider repair, history sync, and auth-token wiring."
authors = ["Simplaj"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
filetime = "0.2"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
