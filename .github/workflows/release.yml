name: Release desktop app

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "app-v*"
      - "codex-api-tools-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            artifact-name: macos-aarch64
            artifact-paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macOS Intel
            platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
            artifact-name: macos-x64
            artifact-paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: Windows x64
            platform: windows-latest
            rust-target: ""
            args: --bundles nsis
            artifact-name: windows-x64
            artifact-paths: |
              src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure macOS ad-hoc signing
        if: runner.os == 'macOS'
        run: echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"

      - name: Build desktop bundle
        run: npm run tauri -- build ${{ matrix.args }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-paths }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="codex-api-tools-v${version}-${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found" >&2
            exit 1
          fi

          title="Codex API Tools v${RELEASE_VERSION}"
          notes=$'Download the Windows or macOS installer from the assets below.\n\nThis build uses the native Rust/rusqlite sync engine and does not require Node.js 24 on end-user machines.'

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${files[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes "${notes}"
          fi
